<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corrigé Interactif - École Dollard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0fdf4;
            background-image: radial-gradient(#bbf7d0 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        /* Animations ludiques */
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
        .animate-fall { animation: fall linear forwards; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #e6fffa; border-radius: 8px; }
        ::-webkit-scrollbar-thumb { background: #38b2ac; border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: #319795; }

        .tab-button { transition: all 0.2s; }
        .tab-button:hover { transform: translateY(-2px); }
        .tab-active {
            background-color: #fef08a !important;
            color: #854d0e !important;
            border-bottom: 4px solid #ca8a04 !important;
            transform: scale(1.05);
            font-weight: 900;
        }

        .math-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(40px, 1fr));
            gap: 2px;
            text-align: center;
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden text-gray-800">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // COMPOSANTS VISUELS & OUTILS
        // ==========================================

        const Confetti = () => {
            const colors = ['#ef4444', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6', '#ec4899'];
            const pieces = Array.from({ length: 80 });
            return (
                <div className="fixed inset-0 pointer-events-none overflow-hidden z-50">
                    {pieces.map((_, i) => (
                        <div key={i} className="absolute w-4 h-4 rounded-sm animate-fall shadow-sm"
                             style={{
                                 left: `${Math.random() * 100}%`,
                                 top: `-10%`,
                                 backgroundColor: colors[Math.floor(Math.random() * colors.length)],
                                 animationDelay: `${Math.random() * 2}s`,
                                 animationDuration: `${2 + Math.random() * 4}s`,
                                 transform: `rotate(${Math.random() * 360}deg)`
                             }}
                        />
                    ))}
                </div>
            );
        };

        const TeacherTip = ({ children }) => (
            <div className="bg-emerald-100 border-l-8 border-emerald-500 p-4 rounded-xl shadow-md my-4 flex items-start gap-4 animate-pop">
                <div className="text-4xl">💡</div>
                <div className="text-emerald-900 font-bold text-lg leading-relaxed flex-1">
                    <span className="block text-emerald-700 uppercase text-sm font-black mb-1">Astuce de prof</span>
                    {children}
                </div>
            </div>
        );

        // Composants SVG pour Représentations Mathématiques
        const Base10 = ({ type, count }) => {
            const renderItems = () => {
                let items = [];
                for(let i=0; i<count; i++) {
                    if (type === 'cube') { // 1000
                        items.push(
                            <svg key={i} width="40" height="40" viewBox="0 0 50 50" className="inline-block m-1 shadow-sm">
                                <rect x="5" y="15" width="30" height="30" fill="#f97316" stroke="#c2410c" strokeWidth="2"/>
                                <polygon points="5,15 15,5 45,5 35,15" fill="#fdba74" stroke="#c2410c" strokeWidth="2"/>
                                <polygon points="35,15 45,5 45,35 35,45" fill="#ea580c" stroke="#c2410c" strokeWidth="2"/>
                            </svg>
                        );
                    } else if (type === 'plaque') { // 100
                        items.push(
                            <svg key={i} width="35" height="35" viewBox="0 0 40 40" className="inline-block m-1 shadow-sm">
                                <rect x="5" y="5" width="30" height="30" fill="#22c55e" stroke="#15803d" strokeWidth="2"/>
                                {/* Grid lines for hundreds plate */}
                                <line x1="8" y1="5" x2="8" y2="35" stroke="#16a34a" strokeWidth="1"/><line x1="11" y1="5" x2="11" y2="35" stroke="#16a34a" strokeWidth="1"/>
                                <line x1="5" y1="8" x2="35" y2="8" stroke="#16a34a" strokeWidth="1"/><line x1="5" y1="11" x2="35" y2="11" stroke="#16a34a" strokeWidth="1"/>
                            </svg>
                        );
                    } else if (type === 'reglette') { // 10
                        items.push(
                            <svg key={i} width="15" height="40" viewBox="0 0 20 50" className="inline-block m-1 shadow-sm">
                                <rect x="5" y="5" width="10" height="40" fill="#3b82f6" stroke="#1d4ed8" strokeWidth="2"/>
                                <line x1="5" y1="9" x2="15" y2="9" stroke="#2563eb" strokeWidth="1"/>
                                <line x1="5" y1="13" x2="15" y2="13" stroke="#2563eb" strokeWidth="1"/>
                            </svg>
                        );
                    } else if (type === 'unite') { // 1
                        items.push(
                            <svg key={i} width="12" height="12" viewBox="0 0 15 15" className="inline-block m-1 shadow-sm">
                                <rect x="2" y="2" width="10" height="10" fill="#eab308" stroke="#a16207" strokeWidth="2"/>
                            </svg>
                        );
                    }
                }
                return items;
            };
            return <div className="flex flex-wrap items-center">{renderItems()}</div>;
        };

        const AngleSvg = ({ type }) => {
            if (type === 'droit') {
                return (
                    <svg width="100" height="100" viewBox="0 0 100 100" className="mx-auto">
                        <path d="M 20 20 L 20 80 L 80 80" fill="none" stroke="#1e40af" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"/>
                        <rect x="20" y="60" width="20" height="20" fill="none" stroke="#dc2626" strokeWidth="3"/>
                    </svg>
                );
            }
            if (type === 'aigu') {
                return (
                    <svg width="100" height="100" viewBox="0 0 100 100" className="mx-auto">
                        <path d="M 80 20 L 20 80 L 80 80" fill="none" stroke="#1e40af" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"/>
                        <path d="M 45 80 A 25 25 0 0 0 41 59" fill="none" stroke="#dc2626" strokeWidth="3"/>
                    </svg>
                );
            }
            if (type === 'obtus') {
                return (
                    <svg width="120" height="100" viewBox="0 0 120 100" className="mx-auto">
                        <path d="M 20 20 L 50 80 L 110 80" fill="none" stroke="#1e40af" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"/>
                        <path d="M 75 80 A 25 25 0 0 1 38 55" fill="none" stroke="#dc2626" strokeWidth="3"/>
                    </svg>
                );
            }
        };

        const LineSvg = ({ type }) => {
            if (type === 'parallele') {
                return (
                    <svg width="100" height="100" viewBox="0 0 100 100" className="mx-auto">
                        <line x1="10" y1="30" x2="90" y2="30" stroke="#047857" strokeWidth="4" strokeLinecap="round"/>
                        <line x1="10" y1="70" x2="90" y2="70" stroke="#047857" strokeWidth="4" strokeLinecap="round"/>
                    </svg>
                );
            }
            if (type === 'perpendiculaire') {
                return (
                    <svg width="100" height="100" viewBox="0 0 100 100" className="mx-auto">
                        <line x1="50" y1="10" x2="50" y2="90" stroke="#047857" strokeWidth="4" strokeLinecap="round"/>
                        <line x1="10" y1="50" x2="90" y2="50" stroke="#047857" strokeWidth="4" strokeLinecap="round"/>
                        <rect x="50" y="35" width="15" height="15" fill="none" stroke="#dc2626" strokeWidth="3"/>
                    </svg>
                );
            }
        };

        const FractionSvg = ({ num, den, color = "#3b82f6" }) => {
            const parts = [];
            const width = 160;
            const height = 40;
            const partWidth = width / den;
            
            for (let i = 0; i < den; i++) {
                parts.push(
                    <rect key={i} x={i * partWidth} y="0" width={partWidth} height={height} 
                          fill={i < num ? color : "white"} 
                          stroke="#1e3a8a" strokeWidth="2" />
                );
            }
            return (
                <div className="flex flex-col items-center justify-center m-2">
                    <svg width={width} height={height} className="shadow-md rounded-sm overflow-hidden border border-blue-800">
                        {parts}
                    </svg>
                    <div className="text-xl font-bold mt-2 bg-white px-3 py-1 rounded-full shadow-sm border border-gray-200">
                        {num} / {den}
                    </div>
                </div>
            );
        };

        const ParallelogramSvg = () => (
            <svg width="150" height="100" viewBox="0 0 150 100" className="mx-auto drop-shadow-lg">
                <polygon points="40,20 140,20 110,80 10,80" fill="#c084fc" stroke="#7e22ce" strokeWidth="4"/>
                <text x="75" y="55" fill="white" fontSize="16" fontWeight="bold" textAnchor="middle">Parallélogramme</text>
            </svg>
        );

        // ==========================================
        // DONNÉES DE L'ÉVALUATION (LE CORRIGÉ)
        // ==========================================
        
        const evaluationData = [
            {
                id: 'p1_all', section: 'Partie 1', title: 'Dictée Mathématique (1 à 4)',
                mission: () => <p className="text-2xl">Écrire en chiffres les nombres, fractions et résultats dictés.</p>,
                sais: () => (
                    <ul className="list-disc pl-8 text-xl space-y-2">
                        <li>Il faut bien écouter la valeur de chaque position.</li>
                        <li>Il faut calculer mentalement les opérations simples.</li>
                    </ul>
                ),
                strategie: () => <p className="text-xl">Je me concentre, j'utilise mes tables d'addition et de multiplication dans ma tête, et j'écris la réponse clairement.</p>,
                demarche: () => (
                    <div className="space-y-6 text-xl">
                        <div className="bg-white p-4 rounded-xl shadow border-2 border-indigo-100">
                            <h3 className="font-bold text-indigo-600 mb-2">1. Nombres</h3>
                            <div className="grid grid-cols-3 gap-4 text-center">
                                <div className="bg-blue-50 p-2 rounded">A: 60 405</div>
                                <div className="bg-blue-50 p-2 rounded">B: 8 012</div>
                                <div className="bg-blue-50 p-2 rounded">C: 14 300</div>
                            </div>
                        </div>
                        <div className="bg-white p-4 rounded-xl shadow border-2 border-indigo-100">
                            <h3 className="font-bold text-indigo-600 mb-2">2. Fractions</h3>
                            <div className="grid grid-cols-3 gap-4 text-center">
                                <div className="bg-green-50 p-2 rounded">A: 1/3</div>
                                <div className="bg-green-50 p-2 rounded">B: 3/4</div>
                                <div className="bg-green-50 p-2 rounded">C: 5/10</div>
                            </div>
                        </div>
                        <div className="bg-white p-4 rounded-xl shadow border-2 border-indigo-100">
                            <h3 className="font-bold text-indigo-600 mb-2">3. Calculs</h3>
                            <div className="grid grid-cols-3 gap-4 text-center">
                                <div className="bg-yellow-50 p-2 rounded">A: 50</div>
                                <div className="bg-yellow-50 p-2 rounded">B: 70</div>
                                <div className="bg-yellow-50 p-2 rounded">C: 600</div>
                            </div>
                        </div>
                        <div className="bg-white p-4 rounded-xl shadow border-2 border-indigo-100">
                            <h3 className="font-bold text-indigo-600 mb-2">4. Multiplications</h3>
                            <div className="grid grid-cols-3 gap-4 text-center">
                                <div className="bg-purple-50 p-2 rounded">A: 48</div>
                                <div className="bg-purple-50 p-2 rounded">B: 49</div>
                                <div className="bg-purple-50 p-2 rounded">C: 36</div>
                            </div>
                        </div>
                    </div>
                ),
                reponse: () => <p className="text-3xl font-black text-center text-indigo-700">Toutes les cases sont bien remplies ! Bravo !</p>,
                astuce: "Pour la dictée de nombres, trace de petits tirets sur ta feuille pour chaque position (ex: _ _   _ _ _) pour ne pas oublier les zéros muets !"
            },
            {
                id: 'p2q1', section: 'Partie 2', title: 'Q1 - Arrondissement',
                mission: () => <p className="text-2xl">Arrondir le nombre <strong>7 482</strong> à la dizaine, à la centaine et à l'unité de mille près.</p>,
                sais: () => (
                    <ul className="list-disc pl-8 text-xl space-y-2">
                        <li>Le nombre à modifier est <span className="font-bold text-blue-600">7 482</span>.</li>
                        <li>Je connais la position de chaque chiffre : 7 (UM), 4 (C), 8 (D), 2 (U).</li>
                    </ul>
                ),
                strategie: () => (
                    <div className="text-xl space-y-4">
                        <p>1. Je souligne le chiffre de la position demandée.</p>
                        <p>2. Je regarde son voisin de droite (je l'encercle).</p>
                        <ul className="bg-yellow-100 p-4 rounded-lg">
                            <li>Si le voisin est <strong>0, 1, 2, 3 ou 4</strong> : le chiffre souligné RESTE PAREIL.</li>
                            <li>Si le voisin est <strong>5, 6, 7, 8 ou 9</strong> : le chiffre souligné MONTE de +1.</li>
                            <li>Tous les chiffres à droite deviennent des zéros.</li>
                        </ul>
                    </div>
                ),
                demarche: () => (
                    <div className="space-y-6 text-2xl font-bold bg-white p-6 rounded-2xl shadow-inner">
                        <div className="flex justify-between items-center border-b pb-4">
                            <span>a) À la dizaine : 7 4 <span className="underline text-red-500">8</span> <span className="border-2 border-blue-500 rounded-full px-2 text-blue-500">2</span></span>
                            <span>➔ Le 2 est petit, le 8 reste. ➔ <span className="text-green-600 text-3xl">7 480</span></span>
                        </div>
                        <div className="flex justify-between items-center border-b pb-4">
                            <span>b) À la centaine : 7 <span className="underline text-red-500">4</span> <span className="border-2 border-blue-500 rounded-full px-2 text-blue-500">8</span> 2</span>
                            <span>➔ Le 8 est grand, le 4 devient 5. ➔ <span className="text-green-600 text-3xl">7 500</span></span>
                        </div>
                        <div className="flex justify-between items-center">
                            <span>c) À l'unité de mille : <span className="underline text-red-500">7</span> <span className="border-2 border-blue-500 rounded-full px-2 text-blue-500">4</span> 8 2</span>
                            <span>➔ Le 4 est petit, le 7 reste. ➔ <span className="text-green-600 text-3xl">7 000</span></span>
                        </div>
                    </div>
                ),
                reponse: () => (
                    <div className="text-center text-2xl space-y-2 font-black text-indigo-800">
                        <p>a) 7 480</p><p>b) 7 500</p><p>c) 7 000</p>
                    </div>
                ),
                astuce: "La comptine magique : 0, 1, 2, 3, 4 je reste là ! 5, 6, 7, 8, 9 je monte en haut !"
            },
            {
                id: 'p2q2', section: 'Partie 2', title: 'Q2 - Matériel Base 10',
                mission: () => <p className="text-2xl">Trouver quel nombre est représenté par le matériel base 10 dessiné.</p>,
                sais: () => (
                    <ul className="list-disc pl-8 text-xl space-y-2">
                        <li>Je vois des cubes (unités de mille).</li>
                        <li>Je vois des plaques (centaines).</li>
                        <li>Je vois des réglettes (dizaines).</li>
                        <li>Je vois des petits cubes (unités).</li>
                    </ul>
                ),
                strategie: () => <p className="text-xl">Je compte chaque type de bloc, je trouve leur valeur et j'additionne le tout pour trouver le grand total.</p>,
                demarche: () => (
                    <div className="space-y-6 text-xl bg-white p-6 rounded-2xl shadow-inner">
                        <div className="flex items-center gap-6 p-2 bg-orange-50 rounded-lg">
                            <Base10 type="cube" count={4} />
                            <div className="font-bold text-2xl">4 Unités de mille = <span className="text-orange-600">4 000</span></div>
                        </div>
                        <div className="flex items-center gap-6 p-2 bg-green-50 rounded-lg">
                            <Base10 type="plaque" count={12} />
                            <div className="font-bold text-2xl">12 Centaines = <span className="text-green-600">1 200</span></div>
                        </div>
                        <div className="flex items-center gap-6 p-2 bg-blue-50 rounded-lg">
                            <Base10 type="reglette" count={3} />
                            <div className="font-bold text-2xl">3 Dizaines = <span className="text-blue-600">30</span></div>
                        </div>
                        <div className="flex items-center gap-6 p-2 bg-yellow-50 rounded-lg">
                            <Base10 type="unite" count={15} />
                            <div className="font-bold text-2xl">15 Unités = <span className="text-yellow-600">15</span></div>
                        </div>
                        <div className="text-3xl font-black text-center mt-4 border-t-4 pt-4 text-indigo-800">
                            4000 + 1200 + 30 + 15 = 5 245
                        </div>
                    </div>
                ),
                reponse: () => <p className="text-4xl font-black text-center text-indigo-700">Le nombre est 5 245.</p>,
                astuce: "Attention au piège ! Il y a plus de 9 plaques (12) et plus de 9 unités (15). 10 centaines = 1 unité de mille. 10 unités = 1 dizaine !"
            },
            {
                id: 'p2q3', section: 'Partie 2', title: 'Q3 - Multiplication',
                mission: () => <p className="text-3xl text-center">Effectuer : <strong>624 × 5 = ?</strong></p>,
                sais: () => <p className="text-xl">Je connais mes tables de multiplication par 5.</p>,
                strategie: () => <p className="text-xl">Je place mes nombres en colonne et je multiplie le 5 avec les unités, puis les dizaines, puis les centaines. Je n'oublie pas d'ajouter mes retenues en haut !</p>,
                demarche: () => (
                    <div className="flex justify-center bg-white p-8 rounded-2xl shadow-inner">
                        <div className="font-mono text-5xl leading-tight text-right tracking-widest relative">
                            <div className="text-red-500 text-2xl absolute -top-8 right-2 font-bold">+2</div>
                            <div className="text-red-500 text-2xl absolute -top-8 right-8 font-bold">+1</div>
                            <div> 624</div>
                            <div className="border-b-4 border-black pb-2">×  5</div>
                            <div className="text-green-600 pt-2 font-black">3120</div>
                        </div>
                    </div>
                ),
                reponse: () => <p className="text-4xl font-black text-center text-indigo-700">3 120</p>,
                astuce: "5 × 4 = 20. J'écris 0 en bas, je mets la retenue de 2 au-dessus du 2. Ensuite 5 × 2 = 10, plus la retenue de 2 = 12 !"
            },
            {
                id: 'p2q4', section: 'Partie 2', title: 'Q4 - Multiplication (UM)',
                mission: () => <p className="text-3xl text-center">Effectuer : <strong>3 108 × 4 = ?</strong></p>,
                sais: () => <p className="text-xl">Je dois multiplier par 4 avec un grand nombre contenant un zéro.</p>,
                strategie: () => <p className="text-xl">Même technique : en colonne de la droite vers la gauche. Attention quand on multiplie par zéro (4 × 0 = 0), il faut tout de même ajouter la retenue si on en a une !</p>,
                demarche: () => (
                    <div className="flex justify-center bg-white p-8 rounded-2xl shadow-inner">
                        <div className="font-mono text-5xl leading-tight text-right tracking-widest relative">
                            <div className="text-red-500 text-2xl absolute -top-8 right-2 font-bold">+3</div>
                            <div> 3108</div>
                            <div className="border-b-4 border-black pb-2">×   4</div>
                            <div className="text-green-600 pt-2 font-black">12432</div>
                        </div>
                    </div>
                ),
                reponse: () => <p className="text-4xl font-black text-center text-indigo-700">12 432</p>,
                astuce: "Ne tombe pas dans le piège ! 4 × 0 = 0, et 0 + 3 (la retenue) = 3. Le chiffre des dizaines sera 3."
            },
            {
                id: 'p2q5', section: 'Partie 2', title: 'Q5 - Soustraction',
                mission: () => <p className="text-3xl text-center">Effectuer : <strong>5 042 - 1 368 = ?</strong></p>,
                sais: () => <p className="text-xl">Je dois trouver la différence. Je vais devoir emprunter car les chiffres du bas sont parfois plus grands que ceux du haut.</p>,
                strategie: () => <p className="text-xl">Je commence par les unités. Si c'est trop petit (ex: 2 - 8, on ne peut pas), je cogne chez le voisin de gauche pour emprunter une dizaine.</p>,
                demarche: () => (
                    <div className="flex flex-col items-center bg-white p-8 rounded-2xl shadow-inner gap-6 text-2xl">
                        <p>On procède par emprunts successifs :</p>
                        <div className="font-mono text-5xl leading-tight text-right tracking-widest">
                            <div className="text-red-500 text-2xl mb-1 flex justify-end gap-2 pr-1">
                                <span>4</span><span className="text-gray-400 text-lg">/</span><span>9</span><span className="text-gray-400 text-lg">/</span><span>13</span><span className="text-gray-400 text-lg">/</span><span>12</span>
                            </div>
                            <div className="text-gray-400 line-through decoration-red-500 decoration-4 text-3xl mb-1"> 5 0 4 2</div>
                            <div> 5 0 4 2</div>
                            <div className="border-b-4 border-black pb-2">- 1 3 6 8</div>
                            <div className="text-green-600 pt-2 font-black"> 3 6 7 4</div>
                        </div>
                    </div>
                ),
                reponse: () => <p className="text-4xl font-black text-center text-indigo-700">3 674</p>,
                astuce: "Emprunter à travers un zéro : Pour faire 3 - 6 (impossible), on veut emprunter aux centaines (0). On ne peut pas ! On doit d'abord emprunter aux unités de mille (5 devient 4) pour donner 10 centaines, ensuite on emprunte à ces 10 (qui devient 9) pour donner 10 dizaines !"
            },
            {
                id: 'p2q6', section: 'Partie 2', title: 'Q6 - Caractéristiques',
                mission: () => <p className="text-2xl">Cocher les bonnes cases pour décrire les nombres 16, 13 et 25 (Pair, Carré, Premier).</p>,
                sais: () => (
                    <ul className="list-disc pl-8 text-xl space-y-2">
                        <li><strong>Pair</strong> : Se termine par 0, 2, 4, 6, 8.</li>
                        <li><strong>Carré</strong> : Résultat d'un nombre multiplié par lui-même (ex: 3x3=9).</li>
                        <li><strong>Premier</strong> : Se divise SEULEMENT par 1 et lui-même.</li>
                    </ul>
                ),

                                <div className="border-b-4 border-black pb-2">× 8</div>
                                <div className="text-red-600 pt-2 font-black"> 96</div>
                            </div>
                        </div>
                        <div className="bg-yellow-50 p-6 rounded-xl border-2 border-yellow-200 text-center w-1/2">
                            <h4 className="font-bold text-yellow-800 mb-4 border-b-2 border-yellow-200 pb-2">Étape 2: Grand Total</h4>
                            <div className="font-mono text-4xl text-right inline-block">
                                <div className="text-red-500 text-xl absolute -top-4 right-[1.6em] font-bold">+1</div>
                                <div> 96</div>
                                <div className="border-b-4 border-black pb-2">+15</div>
                                <div className="text-green-600 pt-2 font-black">111</div>
                            </div>
                        </div>
                    </div>
                ),
                reponse: () => <p className="text-4xl font-black text-center text-indigo-700">111 fleurs</p>,
                astuce: "Sépare toujours ton problème en étapes claires et identifie chaque calcul avec un petit titre."
            },
            {
                id: 'p2q18', section: 'Partie 2', title: 'Q18 - Le nombre mystère',
                mission: () => <p className="text-2xl text-center">"Quel est le nombre carré qui est pair et dont la somme des chiffres est 9 ?"</p>,
                sais: () => (
                    <ul className="list-disc pl-8 text-xl space-y-2">
                        <li>L'indice #1 : C'est un <strong>nombre carré</strong>.</li>
                        <li>L'indice #2 : Il est <strong>pair</strong> (se termine par 0, 2, 4, 6, 8).</li>
                        <li>L'indice #3 : La <strong>somme de ses chiffres = 9</strong>.</li>
                    </ul>
                ),
                strategie: () => <p className="text-xl">Je vais écrire la liste des nombres carrés. Ensuite, je vais barrer ceux qui sont impairs. Enfin, je vais additionner les chiffres de ceux qui restent pour trouver celui qui donne 9.</p>,
                demarche: () => (
                    <div className="bg-white p-6 rounded-2xl shadow-inner text-xl space-y-6">
                        <div>
                            <p className="font-bold mb-2">1. Liste des nombres carrés :</p>
                            <p className="bg-gray-100 p-3 rounded tracking-widest text-2xl font-mono text-center">1 - 4 - 9 - 16 - 25 - 36 - 49 - 64 - 81 - 100</p>
                        </div>
                        <div>
                            <p className="font-bold mb-2">2. Je garde juste les PAIRS :</p>
                            <p className="bg-blue-50 p-3 rounded tracking-widest text-2xl font-mono text-center text-blue-800">4 - 16 - 36 - 64 - 100</p>
                        </div>
                        <div>
                            <p className="font-bold mb-2">3. J'additionne les chiffres pour trouver 9 :</p>
                            <ul className="list-disc pl-12 text-2xl font-mono space-y-2">
                                <li className="text-gray-400">16 ➔ 1 + 6 = 7</li>
                                <li className="text-green-600 font-bold bg-green-100 p-2 rounded inline-block">36 ➔ 3 + 6 = 9 (BINGO!)</li>
                                <li className="text-gray-400">64 ➔ 6 + 4 = 10</li>
                            </ul>
                        </div>
                    </div>
                ),
                reponse: () => <p className="text-4xl font-black text-center text-indigo-700">Le nombre mystère est 36</p>,
                astuce: "Ce type de problème s'appelle un problème de logique avec filtres. Utilise les indices un par un comme un entonnoir pour éliminer les mauvaises réponses !"
            },
            {
                id: 'p2q19', section: 'Partie 2', title: 'Q19 - Facture d\'achats',
                mission: () => <p className="text-2xl text-center">Calculer le coût total de la facture.</p>,
                sais: () => (
                    <div className="bg-white p-4 rounded shadow">
                        <table className="w-full text-center text-xl">
                            <tr className="bg-gray-200"><th className="p-2">Article</th><th>Qté</th><th>Prix Unit.</th></tr>
                            <tr><td>Cahiers</td><td>5</td><td>4$</td></tr>
                            <tr className="bg-gray-50"><td>Crayons</td><td>10</td><td>2$</td></tr>
                            <tr><td>Gommes</td><td>3</td><td>1$</td></tr>
                        </table>
                    </div>
                ),
                strategie: () => <p className="text-xl">Je dois calculer le coût (Total partiel) pour CHAQUE ligne en multipliant la <strong>quantité</strong> par le <strong>prix unitaire</strong>. Ensuite, j'additionne les trois totaux partiels pour avoir le Grand Total.</p>,
                demarche: () => (
                    <div className="bg-white p-6 rounded-2xl shadow-inner text-2xl">
                        <table className="w-full text-center border-collapse">
                            <thead>
                                <tr className="bg-indigo-100 text-indigo-900 border-b-4 border-indigo-200">
                                    <th className="p-4">Calcul</th><th className="p-4">Total Partiel</th>
                                </tr>
                            </thead>
                            <tbody className="font-bold">
                                <tr>
                                    <td className="p-4 border-b">5 × 4$</td><td className="p-4 border-b text-blue-600">20$</td>
                                </tr>
                                <tr className="bg-gray-50">
                                    <td className="p-4 border-b">10 × 2$</td><td className="p-4 border-b text-blue-600">20$</td>
                                </tr>
                                <tr>
                                    <td className="p-4 border-b">3 × 1$</td><td className="p-4 border-b text-blue-600">3$</td>
                                </tr>
                            </tbody>
                            <tfoot>
                                <tr className="bg-green-100 border-t-4 border-green-500 text-3xl">
                                    <td className="p-4 font-black text-right pr-8">GRAND TOTAL :</td>
                                    <td className="p-4 font-black text-green-700">43$</td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                ),
                reponse: () => <p className="text-4xl font-black text-center text-indigo-700">Le coût total est de 43 $</p>,
                astuce: "Quand on multiplie par 10 (comme 10 crayons à 2$), il suffit d'ajouter un zéro à la fin du nombre ! 2 ➔ 20."
            },
            {
                id: 'p2q20', section: 'Partie 2', title: 'Q20 - Problème (Budget)',
                mission: () => <p className="text-2xl text-center font-serif bg-blue-50 p-4 rounded-xl border border-blue-200">"Hôtel: 450$; Essence: 125$; Nourriture: 230$; Activités: 175$. Quel sera le coût total du voyage ?"</p>,
                sais: () => <p className="text-xl">J'ai 4 dépenses différentes pour le voyage. Je dois trouver le total.</p>,
                strategie: () => <p className="text-xl">Je dois additionner les 4 montants en les plaçant bien en colonne, les unités sous les unités, les dizaines sous les dizaines, etc. Pour faire moins d'erreurs, je peux regrouper l'addition en deux étapes !</p>,
                demarche: () => (
                    <div className="flex justify-around bg-white p-8 rounded-2xl shadow-inner text-2xl">
                        <div className="text-center">
                            <h4 className="font-bold text-gray-500 mb-4 text-lg uppercase tracking-wide">Méthode en 1 bloc</h4>
                            <div className="font-mono text-4xl text-right inline-block relative bg-gray-50 p-6 rounded-xl border">
                                <div className="text-red-500 text-xl absolute top-2 right-[1.6em] font-bold">+1</div>
                                <div className="text-red-500 text-xl absolute top-2 right-2 font-bold">+1</div>
                                <div> 450</div>
                                <div> 125</div>
                                <div> 230</div>
                                <div className="border-b-4 border-black pb-2">+175</div>
                                <div className="text-green-600 pt-2 font-black"> 980</div>
                            </div>
                        </div>
                    </div>
                ),
                reponse: () => <p className="text-4xl font-black text-center text-indigo-700">Le coût total du voyage sera de 980 $</p>,
                astuce: "Cherche les amis de 10 quand tu additionnes une longue colonne ! Dans la colonne des unités, 5 + 5 = 10 ! (J'écris 0, je retiens 1)."
            }
        ];

        // ==========================================
        // COMPOSANT PRINCIPAL (APP)
        // ==========================================
        const App = () => {
            const [selectedQuestionId, setSelectedQuestionId] = useState(evaluationData[0].id);
            const [activeTab, setActiveTab] = useState('mission');
            const [showConfetti, setShowConfetti] = useState(false);

            const activeQuestion = evaluationData.find(q => q.id === selectedQuestionId);

            // Gérer le changement d'onglet
            const handleTabClick = (tabId) => {
                setActiveTab(tabId);
                if (tabId === 'reponse') {
                    setShowConfetti(true);
                    setTimeout(() => setShowConfetti(false), 5000); // Stop confetti après 5s
                } else {
                    setShowConfetti(false);
                }
            };

            // Réinitialiser l'onglet quand on change de question
            useEffect(() => {
                setActiveTab('mission');
                setShowConfetti(false);
            }, [selectedQuestionId]);

            const tabs = [
                { id: 'mission', emoji: '🎯', label: 'La mission' },
                { id: 'sais', emoji: '🔍', label: 'Je sais / cherche' },
                { id: 'strategie', emoji: '🧠', label: 'Ma stratégie' },
                { id: 'demarche', emoji: '✍️', label: 'Démarche et Calculs' },
                { id: 'reponse', emoji: '🏆', label: 'Réponse finale' }
            ];

            return (
                <div className="flex flex-col h-full overflow-hidden bg-slate-50">

                            <div>

                                <h2 className="text-xl font-bold text-slate-500">Révision mathématique 2 - Étape 1 (4e année)</h2>
                            </div>
                        </div>
                        <div className="bg-emerald-100 text-emerald-800 px-6 py-2 rounded-full font-bold text-lg shadow-inner">
                            Corrigé Interactif
                        </div>
                    </header>

                    {/* Main Workspace */}
                    <div className="flex flex-1 overflow-hidden">
                        
                        {/* Sidebar (Navigation) */}
                        <div className="w-80 bg-white shadow-xl z-10 flex flex-col border-r border-gray-200">
                            <div className="p-4 bg-slate-800 text-white font-bold text-xl uppercase tracking-wider text-center">
                                Questions
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-2 custom-scrollbar">
                                {evaluationData.map(q => (
                                    <button 
                                        key={q.id}
                                        onClick={() => setSelectedQuestionId(q.id)}
                                        className={`w-full text-left p-3 rounded-xl font-bold transition-all ${selectedQuestionId === q.id ? 'bg-indigo-600 text-white shadow-lg transform scale-105 ml-2' : 'bg-slate-100 text-slate-600 hover:bg-indigo-100 hover:text-indigo-800'}`}
                                    >
                                        <span className="block text-xs opacity-75 uppercase">{q.section}</span>
                                        {q.title}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Content Area */}
                        <div className="flex-1 flex flex-col bg-slate-50 relative overflow-y-auto">
                            
                            {/* Tabs Navigation */}
                            <div className="flex justify-center bg-white shadow-sm border-b px-8 pt-4 gap-2 sticky top-0 z-20">
                                {tabs.map(tab => (
                                    <button
                                        key={tab.id}
                                        onClick={() => handleTabClick(tab.id)}
                                        className={`tab-button px-6 py-4 rounded-t-2xl font-bold text-lg flex items-center gap-2 border-t-2 border-l-2 border-r-2 ${activeTab === tab.id ? 'tab-active bg-yellow-200 text-yellow-900 border-yellow-400' : 'bg-gray-100 text-gray-500 border-transparent hover:bg-gray-200'}`}
                                    >
                                        <span className="text-2xl">{tab.emoji}</span>
                                        {tab.label}
                                    </button>
                                ))}
                            </div>

                            {/* Tab Content Display */}
                            <div className="flex-1 p-8 overflow-y-auto">
                                <div className="max-w-4xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100 animate-pop">
                                    
                                    {/* Content Header */}
                                    <div className="bg-indigo-50 border-b border-indigo-100 p-6 flex items-center justify-between">
                                        <h2 className="text-3xl font-black text-indigo-900">{activeQuestion.title}</h2>
                                        <div className="text-indigo-300 text-5xl opacity-50 font-black">#{activeQuestion.id.replace('p2q','').replace('p1_all','1')}</div>
                                    </div>

                                    {/* Main Box Area */}
                                    <div className="p-10 min-h-[400px] flex flex-col justify-center">
                                        
                                        {activeTab === 'mission' && (
                                            <div className="text-center animate-pop">
                                                <div className="text-6xl mb-6">🎯</div>
                                                {activeQuestion.mission()}
                                            </div>
                                        )}
                                        
                                        {activeTab === 'sais' && (
                                            <div className="animate-pop">
                                                <div className="flex items-center gap-4 mb-6 border-b-2 border-blue-100 pb-4">
                                                    <div className="text-5xl">🔍</div>
                                                    <h3 className="text-2xl font-bold text-blue-900">Ce que je sais et ce que je cherche :</h3>
                                                </div>
                                                <div className="bg-blue-50 p-8 rounded-2xl">
                                                    {activeQuestion.sais()}
                                                </div>
                                            </div>
                                        )}
                                        
                                        {activeTab === 'strategie' && (
                                            <div className="animate-pop">
                                                <div className="flex items-center gap-4 mb-6 border-b-2 border-purple-100 pb-4">
                                                    <div className="text-5xl">🧠</div>
                                                    <h3 className="text-2xl font-bold text-purple-900">Ma stratégie de résolution :</h3>
                                                </div>
                                                <div className="bg-purple-50 p-8 rounded-2xl">
                                                    {activeQuestion.strategie()}
                                                </div>
                                            </div>
                                        )}
                                        
                                        {activeTab === 'demarche' && (
                                            <div className="animate-pop">
                                                <div className="flex items-center gap-4 mb-6 border-b-2 border-orange-100 pb-4">
                                                    <div className="text-5xl">✍️</div>
                                                    <h3 className="text-2xl font-bold text-orange-900">Les calculs pas à pas :</h3>
                                                </div>
                                                <div className="bg-slate-50 p-8 rounded-2xl border-2 border-dashed border-gray-300">
                                                    {activeQuestion.demarche()}
                                                </div>
                                            </div>
                                        )}
                                        
                                        {activeTab === 'reponse' && (
                                            <div className="animate-pop text-center">
                                                <div className="text-7xl mb-6 animate-bounce">🏆</div>
                                                <div className="bg-green-100 p-12 rounded-3xl border-4 border-green-400 shadow-xl inline-block w-full">
                                                    {activeQuestion.reponse()}
                                                </div>
                                            </div>
                                        )}

                                    </div>
                                    
                                </div>
                                
                                {/* Always show Teacher Tip if there is one, but softly animate it */}
                                {activeQuestion.astuce && (
                                    <div className="max-w-4xl mx-auto mt-6">
                                        <TeacherTip>{activeQuestion.astuce}</TeacherTip>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
